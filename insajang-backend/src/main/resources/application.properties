# --------------------------------------------------
# \uB370\uC774\uD130\uBCA0\uC774\uC2A4(DB) \uC5F0\uACB0 \uC124\uC815
# --------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/insajang
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# --------------------------------------------------
# JPA \uBC0F \uD558\uC774\uBC84\uB124\uC774\uD2B8(Hibernate) \uC124\uC815
# --------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.orm.jdbc.bind=trace

# \uBA54\uC77C \uC11C\uBC84 \uC124\uC815 (Gmail \uAE30\uC900)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#프로젝트 전용 변수 (하드코딩 방지용)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}
app.python-url=${APP_PYTHON_URL:http://localhost:8000}

# 파일 업로드 경로 설정
# 로컬 테스트용 (프로젝트 폴더 내 uploads 폴더)
file.upload-dir=uploads